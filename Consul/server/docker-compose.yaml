version: '3.8'

services:
  consul-server:
    image: hashicorp/consul:${CONSUL_VERSION:-1.22.3}
    container_name: consul-server
    hostname: consul-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - consul-data:/consul/data
    environment:
      - CONSUL_CA_CERT_B64=${CONSUL_CA_CERT_B64}
      - CONSUL_CA_KEY_B64=${CONSUL_CA_KEY_B64}
      - CONSUL_SERVER_CERT_B64=${CONSUL_SERVER_CERT_B64}
      - CONSUL_SERVER_KEY_B64=${CONSUL_SERVER_KEY_B64}
      - CONSUL_DATACENTER=${CONSUL_DATACENTER}
    configs:
      - source: consul_server_config
        target: /consul/config/consul-server.hcl
      - source: consul_service_defaults_reactive_resume
        target: /consul/config/service-defaults-reactive-resume.hcl
      - source: consul_service_defaults_n8n
        target: /consul/config/service-defaults-n8n.hcl
      - source: consul_service_defaults_prometheus
        target: /consul/config/service-defaults-prometheus.hcl
      - source: consul_service_resolver_reactive_resume
        target: /consul/config/service-resolver-reactive-resume.hcl
      - source: consul_service_intentions_reactive_resume
        target: /consul/config/service-intentions-reactive-resume.hcl
      - source: consul_service_intentions_consul
        target: /consul/config/service-intentions-consul.hcl
      - source: consul_service_intentions_prometheus
        target: /consul/config/service-intentions-prometheus.hcl
      - source: consul_server_config_v2
        target: /consul/config/consul.hcl
    entrypoint: >
      sh -c '
        echo "Preparing certs..."
        mkdir -p /consul/certs
        echo "$$CONSUL_CA_CERT_B64"     | base64 -d > /consul/certs/consul-agent-ca.pem
        echo "$$CONSUL_CA_KEY_B64"      | base64 -d > /consul/certs/consul-agent-ca-key.pem
        echo "$$CONSUL_SERVER_CERT_B64" | base64 -d > /consul/certs/$$CONSUL_DATACENTER-server-consul-0.pem
        echo "$$CONSUL_SERVER_KEY_B64"  | base64 -d > /consul/certs/$$CONSUL_DATACENTER-server-consul-0-key.pem
        echo "Certs ready."
        exec consul agent -config-dir=/consul/config/
      '

volumes:
  consul-data:

configs:
  consul_server_config_v2:
    content: |
      datacenter = "${CONSUL_DATACENTER}"
      data_dir   = "/consul/data"
      log_level  = "${CONSUL_LOG_LEVEL}"
      server     = true
      bootstrap_expect = 1
      bind_addr      = "${CONSUL_BIND_IP}"
      advertise_addr = "${CONSUL_ADVERTISE_IP}"
      client_addr    = "0.0.0.0"

      encrypt                 = "${CONSUL_GOSSIP_KEY}"
      encrypt_verify_incoming = true
      encrypt_verify_outgoing = true

      tls {
        defaults {
          ca_file   = "/consul/certs/consul-agent-ca.pem"
          cert_file = "/consul/certs/${CONSUL_DATACENTER}-server-consul-0.pem"
          key_file  = "/consul/certs/${CONSUL_DATACENTER}-server-consul-0-key.pem"
          verify_incoming = true
          verify_outgoing = true
        }
        internal_rpc {
          verify_server_hostname = true
        }
      }

      auto_encrypt {
        allow_tls = true
      }

      connect {
        enabled = true
        ca_config {
          leaf_cert_ttl = "24h"
        }
      }

      ports {
        grpc     = 8502
        grpc_tls = 8503
      }

      ui_config {
        enabled = true
      }

      performance {
        raft_multiplier = 1
      }

      telemetry {
        prometheus_retention_time = "30s"
        disable_hostname          = false
      }



  consul_service_defaults_reactive_resume:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind     = "service-defaults"
            Name     = "reactive-resume"
            Protocol = "http"
          }
        ]
      }

  consul_service_defaults_n8n:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind     = "service-defaults"
            Name     = "n8n"
            Protocol = "http"
          }
        ]
      }

  consul_service_defaults_prometheus:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind     = "service-defaults"
            Name     = "prometheus"
            Protocol = "http"
          }
        ]
      }

  consul_service_resolver_reactive_resume:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind           = "service-resolver"
            Name           = "reactive-resume"
            ConnectTimeout = "5s"
          }
        ]
      }

  consul_service_intentions_consul:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind = "service-intentions"
            Name = "consul"
            Sources = [
              {
                Name        = "prometheus"
                Action      = "allow"
                Description = "Prometheus darf Consul Metrics scrapen"
              },
              {
                Name        = "*"
                Action      = "deny"
                Description = "Default deny all"
              }
            ]
          }
        ]
      }

  consul_service_intentions_prometheus:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind = "service-intentions"
            Name = "prometheus"
            Sources = [
              {
                Name        = "*"
                Action      = "deny"
                Description = "Default deny all"
              }
            ]
          }
        ]
      }

  consul_service_intentions_reactive_resume:
    content: |
      config_entries {
        bootstrap = [
          {
            Kind = "service-intentions"
            Name = "reactive-resume"
            Sources = [
              {
                Name        = "n8n"
                Action      = "allow"
                Description = "n8n darf reactive-resume erreichen"
              },
              {
                Name        = "*"
                Action      = "deny"
                Description = "Default deny all"
              }
            ]
          }
        ]
      }