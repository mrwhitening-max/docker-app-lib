services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2g
    ports:
      - "4000-4001:4000"
    configs:
      - source: litellm_config
        target: /app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2" ]
    networks:
      - internal
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-1234}
      - DATABASE_URL=postgresql://${LITELLM_POSTGRES_USER:-postgres}:${LITELLM_POSTGRES_PASSWORD}@${LITELLM_POSTGRES_HOST:-litellm_db}:${LITELLM_POSTGRES_PORT:-5432}/${LITELLM_POSTGRES_DB:-postgres}
      - STORE_MODEL_IN_DB=True
      - UI_USERNAME=${UI_USERNAME}
      - UI_PASSWORD=${UI_PASSWORD}
      - REDIS_HOST=${LITELLM_REDIS_HOST:-litellm_redis}
      - REDIS_PORT=${LITELLM_REDIS_PORT:-6379}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY2=${GEMINI_API_KEY2}
      - GEMINI_API_KEY3=${GEMINI_API_KEY3}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY2=${OPENROUTER_API_KEY2}
      - OPENROUTER_API_KEY3=${OPENROUTER_API_KEY3}
    env_file:
      - .env
    depends_on:
      - litellm_db
      - litellm_redis

  litellm_db:
    image: postgres:16.1
    container_name: litellm_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${LITELLM_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${LITELLM_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_PORT=${LITELLM_POSTGRES_PORT:-5432}
      - POSTGRES_DB=${LITELLM_POSTGRES_DB:-postgres}
      - POSTGRES_HOST=${LITELLM_POSTGRES_HOST:-litellm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  litellm_redis:
    image: redis/redis-stack:latest
    container_name: litellm_redis
    restart: always
    volumes:
      - redis_data:/root/redis
    environment:
      - REDIS_HOST=${LITELLM_REDIS_HOST:-litellm_redis}
      - REDIS_PORT=${LITELLM_REDIS_PORT:-6379}
      - REDIS_SSL=False
    networks:
      - internal

configs:
  litellm_config:
    content: |
      model_list:
        # OLLAMA (remote)
        - model_name: ollama/*
          litellm_params:
            model: ollama/*
            api_base: os.environ/OLLAMA_API_BASE

        # ANTHROPIC CLAUDE
        - model_name: claude/*
          litellm_params:
            model: anthropic/claude-opus-4-7
            api_key: os.environ/ANTHROPIC_API_KEY
        - model_name: claude/*
          litellm_params:
            model: anthropic/claude-sonnet-4-6
            api_key: os.environ/ANTHROPIC_API_KEY
        - model_name: claude/*
          litellm_params:
            model: anthropic/claude-haiku-4-5-20251001
            api_key: os.environ/ANTHROPIC_API_KEY

        # GEMINI
        - model_name: gemini/*
          litellm_params:
            model: gemini/*
            api_key: os.environ/GEMINI_API_KEY
            drop_params: true
        - model_name: gemini/*
          litellm_params:
            model: gemini/*
            api_key: os.environ/GEMINI_API_KEY2
            drop_params: true
        - model_name: gemini/*
          litellm_params:
            model: gemini/*
            api_key: os.environ/GEMINI_API_KEY3
            drop_params: true

        # Openrouter
        - model_name: openrouter/*
          litellm_params:
            model: openrouter/*
            api_key: os.environ/OPENROUTER_API_KEY
        - model_name: openrouter/*
          litellm_params:
            model: openrouter/*
            api_key: os.environ/OPENROUTER_API_KEY2
        - model_name: openrouter/*
          litellm_params:
            model: openrouter/*
            api_key: os.environ/OPENROUTER_API_KEY3

      general_settings:
        forward_openai_org_id: true

      litellm_settings:
        enable_json_schema_validation: True
        drop_params: True
        num_retries: 3
        allowed_fails: 3
        cooldown_time: 30
        cache: True
        cache_params:
          type: redis

      router_settings:
        fallbacks:
          - "gemini/gemini-2.0-flash-thinking-exp": ["openrouter/google/gemini-2.0-flash-thinking-exp:free"]
          - "gemini/gemini-2.0-pro-exp-02-05": ["openrouter/google/gemini-2.0-pro-exp-02-05:free"]
          - "gemini/gemini-2.0-flash": ["openrouter/google/gemini-2.0-flash-exp:free"]
        routing_strategy: usage-based-routing-v2
        redis_host: litellm_redis
        redis_port: 6379
        enable_pre_call_check: true

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
