services:
  paperless-ai:
    image: clusterzx/paperless-ai
    container_name: paperless-ai
    network_mode: bridge
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    environment:
      - PUID=1000
      - PGID=1000
      - PAPERLESS_AI_PORT=${PAPERLESS_AI_PORT:-3000}
      - RAG_SERVICE_URL=http://localhost:8000
      - RAG_SERVICE_ENABLED=true
    entrypoint: >
      /bin/sh -c "
      echo 'Infiltriere config.js...' &&
      sed -i \"s/5000/120000/g\" /app/config/config.js &&
      echo 'Mojo geladen! Starte Dienste...' &&
      /app/start-services.sh
      "
    ports:
      - "3000:${PAPERLESS_AI_PORT:-3000}"
    volumes:
      - /data/paperless-ai_data:/app/data

volumes:
  paperless-ai_data:
